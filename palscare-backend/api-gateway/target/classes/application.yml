server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: doctor-slot-service
          uri: lb://doctor-slot-service
          predicates:
            - Path=/api/v1/doctors/chambers, /api/v1/doctors/chambers/**, /api/v1/doctors/slots, /api/v1/doctors/slots/**, /api/v1/patients/doctors/*/slots
          filters:
            - RemoveRequestHeader=Cookie
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/patients/appointments, /api/v1/patients/appointments/**
          filters:
            - RemoveRequestHeader=Cookie
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/patients/profile, /api/v1/patients/doctors, /api/v1/patients/internal/**, /api/v1/doctors/profile, /api/v1/doctors/onboarding, /api/v1/doctors/internal/**
          filters:
            - RemoveRequestHeader=Cookie
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use placeholder issuer URI. For local testing, validation can be mocked or pointed to real Okta client
          issuer-uri: https://dev-placeholder.okta.com/oauth2/default
          jwk-set-uri: https://dev-placeholder.okta.com/oauth2/default/v1/keys

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
