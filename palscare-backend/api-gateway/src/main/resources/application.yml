server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: doctor-slot-service
          uri: ${DOCTOR_SLOT_SERVICE_URL:lb://doctor-slot-service}
          predicates:
            - Path=/api/v1/doctors/chambers, /api/v1/doctors/chambers/**, /api/v1/doctors/slots, /api/v1/doctors/slots/**, /api/v1/patients/doctors/*/slots
          filters:
            - RemoveRequestHeader=Cookie
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:lb://booking-service}
          predicates:
            - Path=/api/v1/patients/appointments, /api/v1/patients/appointments/**
          filters:
            - RemoveRequestHeader=Cookie
        - id: user-service
          uri: ${USER_SERVICE_URL:lb://user-service}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/patients/profile, /api/v1/patients/doctors, /api/v1/patients/internal/**, /api/v1/doctors/profile, /api/v1/doctors/onboarding, /api/v1/doctors/internal/**
          filters:
            - RemoveRequestHeader=Cookie
  # Using local symmetric JWT validation in SecurityConfig

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
